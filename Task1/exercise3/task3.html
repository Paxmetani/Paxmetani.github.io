<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 3 - Table and Form</title>
    <link rel="stylesheet" href="stylen.css">
</head>
<body>

    <h1 id="table-heading">Student Grades</h1>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Subject</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Aldiyar</td>
                <td>Math</td>
                <td>95</td>
            </tr>
            <tr class="highlight-row">
                <td>Temirlan</td>
                <td>Physics</td>
                <td>88</td>
            </tr>
            <tr>
                <td>Aidar</td>
                <td>History</td>
                <td>76</td>
            </tr>
            <tr>
                <td>Asanali</td>
                <td>Literature</td>
                <td>90</td>
            </tr>
        </tbody>
    </table>

    <!-- Форма -->
    <h1 id="form-heading">Feedback Form</h1>

    <form id="feedback-form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="role">Role:</label>
        <select id="role" name="role">
            <option>Student</option>
            <option>Teacher</option>
            <option>Other</option>
        </select>

        <p>Did you like this assignment?</p>
        <label><input type="radio" name="like" value="yes"> Yes</label>
        <label><input type="radio" name="like" value="no"> No</label>

        <label for="comments">Comments:</label>
        <textarea id="comments" name="comments" rows="4"></textarea>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
